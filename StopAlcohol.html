<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금주 서바이벌 & 신체 변화 로드맵</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.1"></script>
    <style>
        :root {
            --primary-color: #3498db;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --bg-color: #f0f2f5;
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; text-align: center; padding: 20px; background-color: var(--bg-color); color: #333; line-height: 1.6; }
        .container { max-width: 550px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* 타이머 섹션 */
        .timer-display { margin: 15px 0; padding: 20px; background: #fff5f5; border-radius: 15px; border: 1px solid #ffe3e3; }
        .time-unit { display: block; font-size: 2.8rem; font-weight: 800; color: var(--danger-color); }
        
        .rank-info { background: #e3f2fd; padding: 15px; border-radius: 15px; margin: 15px 0; border: 1px solid #bbdefb; }
        .rank-number { font-size: 1.5rem; font-weight: bold; color: #1976d2; }
        
        .chart-container { position: relative; height: 260px; width: 100%; margin-top: 20px; }
        
        /* 신체 변화 섹션 */
        .change-section { margin-top: 30px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .change-card { background: #fff; border: 1px solid #e1e4e8; border-radius: 12px; padding: 12px 15px; margin-bottom: 10px; transition: 0.3s; }
        .change-card.active { border-color: var(--success-color); background-color: #fafffa; }
        .change-card.doing { border-color: var(--primary-color); background-color: #f0f7ff; }
        
        .change-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .change-title { font-weight: bold; color: #2c3e50; font-size: 0.95rem; }
        
        /* 미니 막대그래프 */
        .progress-container { display: flex; align-items: center; gap: 8px; }
        .progress-bg { background: #eee; height: 8px; border-radius: 4px; overflow: hidden; width: 70px; }
        .progress-fill { background: var(--primary-color); height: 100%; width: 0%; transition: width 0.5s ease; }
        .percentage { font-size: 0.75rem; color: var(--primary-color); font-weight: bold; min-width: 35px; text-align: right; }
        .change-desc { font-size: 0.8rem; color: #666; margin: 0; line-height: 1.3; }

        input[type="datetime-local"] { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; background-color: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; }
        .reset-btn { background-color: #ecf0f1; color: #7f8c8d; margin-top: 20px; padding: 8px; font-size: 0.8rem; width: auto; border-radius: 5px; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚫 금주 서바이벌 리포트</h1>
    
    <div id="setupArea">
        <p>1,000명의 동전자 중 당신의 위치와<br>몸의 변화를 실시간으로 추적합니다.</p>
        <input type="datetime-local" id="dateTimeInput">
        <button onclick="saveDate()">도전 시작</button>
    </div>

    <div id="displayArea" style="display: none;">
        <div class="timer-display">
            <span id="mainDays" class="time-unit">0일</span>
            <div id="subTime" style="font-size: 1.2rem; font-weight: 600; color: #555;">0시간 0분 0초</div>
        </div>

        <div class="rank-info">
            <div>현재 금주 유지자: <span class="rank-number" id="survivors">1,000</span>명</div>
            <div>나의 현재 순위: <span class="rank-number" id="myRank">1</span>위</div>
        </div>

        <div class="chart-container">
            <canvas id="survivalChart"></canvas>
        </div>

        <div class="change-section">
            <h3 style="margin-bottom: 15px; text-align: center;">🧬 신체 회복 로드맵</h3>
            <div id="changeList"></div>
        </div>
        
        <p id="startDateText" style="font-size: 0.8rem; color: #999; margin-top:20px;"></p>
        <button class="reset-btn" onclick="resetDate()">기록 재설정</button>
    </div>
</div>

<script>
    let timerInterval = null;
    let chart = null;
    let allDataPoints = [];

    // 단계별 데이터 정의
    const stages = [
        { d: 1, t: "1일: 알코올 해독", desc: "혈당 수치가 안정화되고 몸속 독소 배출이 시작됩니다." },
        { d: 7, t: "1주: 수면의 질 향상", desc: "수면 사이클이 정상화되어 깊은 잠(REM) 비중이 늘어납니다." },
        { d: 14, t: "2주: 위장 기능 회복", desc: "역류성 식도염 증상이 완화되고 소화 능력이 개선됩니다." },
        { d: 21, t: "3주: 혈압 및 부기 감소", desc: "체내 염증이 줄어들며 얼굴과 몸의 부기가 눈에 띄게 빠집니다." },
        { d: 30, t: "1개월: 간 기능의 부활", desc: "간 지방 수치가 약 15% 감소하며 피부 안색이 맑아집니다." },
        { d: 60, t: "2개월: 뇌 기능 최적화", desc: "도파민 수용체가 회복되어 일상의 즐거움을 다시 느끼기 시작합니다." },
        { d: 90, t: "3개월: 면역력 강화", desc: "혈액세포가 교체되며 전반적인 면역 시스템이 견고해집니다." },
        { d: 180, t: "6개월: 인지 능력 향상", desc: "단기 기억력과 집중력이 술 마시기 전 수준으로 회복됩니다." },
        { d: 365, t: "1년: 질병 위험 급감", desc: "구강암, 간암, 유방암 등 암 발생 위험이 현저히 낮아집니다." }
    ];

    window.onload = function() {
        renderChangeCards(); // 카드 틀 먼저 생성
        const saved = localStorage.getItem('quitDrinkingDateTime');
        if (saved) startApp(saved);
    };

    function renderChangeCards() {
        const list = document.getElementById('changeList');
        list.innerHTML = stages.map((s, i) => `
            <div class="change-card" id="card${i}">
                <div class="change-header">
                    <span class="change-title">${s.t}</span>
                    <div class="progress-container">
                        <div class="progress-bg"><div class="progress-fill" id="fill${i}"></div></div>
                        <span class="percentage" id="perc${i}">0%</span>
                    </div>
                </div>
                <p class="change-desc">${s.desc}</p>
            </div>
        `).join('');
    }

    function saveDate() {
        const input = document.getElementById('dateTimeInput').value;
        if (!input) return alert("날짜와 시간을 입력하세요.");
        localStorage.setItem('quitDrinkingDateTime', input);
        startApp(input);
    }

    function startApp(startISO) {
        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('displayArea').style.display = 'block';
        Chart.register(window['chartjs-plugin-annotation']);
        
        allDataPoints = [];
        for (let i = 0; i <= 365; i++) { // 그래프 범위를 1년으로 확장
            allDataPoints.push({x: i, y: Math.round(1000 * Math.exp(-0.04 * i))});
        }

        initChart();
        update(startISO);
        timerInterval = setInterval(() => update(startISO), 1000);
    }

    function update(startISO) {
        const start = new Date(startISO);
        const now = new Date();
        let diff = now - start;
        if (diff < 0) diff = 0;

        const totalDays = diff / (24 * 60 * 60 * 1000);
        const displayDays = Math.floor(totalDays);
        const hours = Math.floor((diff % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
        const minutes = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));
        const seconds = Math.floor((diff % (60 * 1000)) / 1000);

        document.getElementById('mainDays').innerText = displayDays + "일";
        document.getElementById('subTime').innerText = `${hours}시간 ${minutes}분 ${seconds}초`;
        document.getElementById('startDateText').innerText = "금주 시작: " + startISO.replace('T', ' ');

        let survivorCount = Math.round(1000 * Math.exp(-0.04 * displayDays));
        if (survivorCount < 1) survivorCount = 1;

        document.getElementById('survivors').innerText = survivorCount.toLocaleString();
        document.getElementById('myRank').innerText = survivorCount.toLocaleString();

        updateChart(totalDays);
        updateProgress(totalDays);
    }

    function initChart() {
        const ctx = document.getElementById('survivalChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    { label: '탈락자 영역', data: [], borderColor: 'rgba(231, 76, 60, 0.5)', backgroundColor: 'rgba(231, 76, 60, 0.15)', fill: true, tension: 0.3, pointRadius: 0 },
                    { label: '금주 유지자 수', data: allDataPoints, borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.1)', fill: true, tension: 0.3, pointRadius: 0 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', min: 0, max: 100, title: { display: true, text: '경과일수 (초반 집중구간)' } },
                    y: { beginAtZero: true, max: 1000 }
                },
                plugins: {
                    legend: { display: true },
                    annotation: {
                        annotations: {
                            line1: { type: 'line', xMin: 0, xMax: 0, borderColor: 'red', borderWidth: 2, label: { display: true, content: '현재', position: 'end', backgroundColor: 'red' } }
                        }
                    }
                }
            }
        });
    }

    function updateChart(totalDays) {
        if (!chart) return;
        // x축 범위를 현재 날짜에 맞춰 유동적으로 조절 (최소 100일)
        const currentMax = Math.max(100, Math.min(365, Math.ceil(totalDays + 10)));
        chart.options.scales.x.max = currentMax;
        
        chart.data.datasets[0].data = allDataPoints.filter(p => p.x <= totalDays);
        chart.data.datasets[1].data = allDataPoints.filter(p => p.x >= Math.floor(totalDays));
        chart.options.plugins.annotation.annotations.line1.xMin = totalDays;
        chart.options.plugins.annotation.annotations.line1.xMax = totalDays;
        chart.update('none');
    }

    function updateProgress(totalDays) {
        stages.forEach((s, i) => {
            const perc = Math.min((totalDays / s.d) * 100, 100).toFixed(1);
            const fill = document.getElementById(`fill${i}`);
            const percText = document.getElementById(`perc${i}`);
            const card = document.getElementById(`card${i}`);

            fill.style.width = perc + '%';
            percText.innerText = perc + '%';

            if (perc >= 100) {
                card.classList.remove('doing');
                card.classList.add('active');
                fill.style.backgroundColor = 'var(--success-color)';
            } else if (perc > 0) {
                card.classList.add('doing');
                card.classList.remove('active');
                fill.style.backgroundColor = 'var(--primary-color)';
            }
        });
    }

    function resetDate() {
        if (confirm("기록을 재설정하시겠습니까?")) {
            clearInterval(timerInterval);
            localStorage.removeItem('quitDrinkingDateTime');
            location.reload();
        }
    }
</script>

</body>
</html>
