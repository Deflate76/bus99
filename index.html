<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>버스 출발 시간표</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: Arial, Helvetica, "Noto Sans KR", system-ui;
      background:#f5f5f5;
      margin:0;
      color: #333;
    }

    /* 상단 선택 바 */
    .selectors {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      padding:12px 16px;
      background:#333;
      color:#fff;
      align-items:center;
    }
    .selectors label { flex:1 1 45%; min-width:0; font-size: 14px; }
    .toggles { display:flex; align-items:center; gap:8px; margin-left:auto; flex:0 0 auto; }
    select { padding:6px 8px; border-radius: 4px; width: 100%; margin-top: 4px; }

    /* 실시간 정보창 */
    .info { padding:16px; background:#fff; border-bottom: 2px solid #ddd; }
    .current-time { font-size: 13px; color: #666; margin-bottom: 10px; }
    
    .next-bus-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .bus-info-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-radius: 8px;
      background: #f9f9f9;
      border-left: 5px solid #ccc;
    }
    .bus-info-card.route-99 { border-left-color: #d32f2f; }
    .bus-info-card.route-21 { border-left-color: #1976d2; }
    
    .bus-name { font-weight: bold; font-size: 16px; }
    .bus-name.route-99 { color: #d32f2f; }
    .bus-name.route-21 { color: #1976d2; }
    
    .bus-time-details { text-align: right; }
    .departure-time { font-size: 16px; font-weight: bold; color: #222; }
    .remaining-min { font-size: 13px; color: #ff5722; font-weight: bold; margin-left: 5px; }

    /* 테이블 스타일 */
    .table-container { padding:8px; overflow-x:auto; background: #fff; }
    table { width:100%; border-collapse:collapse; min-width: 320px; }
    th, td { border:1px solid #ccc; padding:8px 2px; text-align:center; font-size: 13px; }
    th { background:#eee; font-weight: bold; }
    
    /* 모바일 최적화: 5호차까지 다 보이도록 간격 조정 */
    @media (max-width: 480px) {
      th, td { font-size: 12px; padding: 6px 1px; }
      .bus-name { font-size: 14px; }
      .departure-time { font-size: 14px; }
    }

    .cell-prev { background:#c8e6c9 !important; } /* 직전 버스 */
    .cell-next { background:#fff59d !important; font-weight: bold; } /* 다음 버스 */
  </style>
</head>
<body>

  <div class="selectors">
    <label>노선 선택:
      <select id="routeSelect">
        <option value="99번" selected>99번</option>
        <option value="2-1번">2-1번</option>
      </select>
    </label>
    <label>출발 방향:
      <select id="directionSelect"></select>
    </label>
    <div class="toggles">
      <input type="checkbox" id="compactToggle" />
      <label for="compactToggle" style="color:white; font-size:12px;">열 축소</label>
    </div>
  </div>

  <div class="info" id="infoBox">
    <div class="current-time" id="currentTimeDisplay">로딩 중...</div>
    <div class="next-bus-area" id="nextBusArea">
      </div>
  </div>

  <div class="table-container" id="tableContainer"></div>

<script>
/* 시간표 데이터 */
const timetable = {
  weekday: {
    "99번": [[1,"6:10","6:40","6:20","6:50","6:30","7:00","6:40","7:10","7:00","7:30"],[2,"6:50","7:20","7:00","7:30","7:10","7:40","7:20","7:50","7:40","8:05"],[3,"7:50","8:20","8:00","8:30","8:10","8:40","8:20","8:50","8:40","9:05"],[4,"8:50","9:20","9:00","9:30","9:10","9:40","9:20","9:50","9:40","10:05"],[5,"9:50","10:20","10:00","10:30","10:10","10:40","10:20","10:50","10:40","11:05"],[6,"10:50","11:20","11:00","11:30","11:10","11:40","11:20","11:50","11:40","12:05"],[7,"11:50","12:20","12:00","12:30","12:10","12:40","12:20","12:50","12:40","13:05"],[8,"12:50","13:20","13:00","13:30","13:10","13:40","13:20","13:50","13:40","14:05"],[9,"13:50","14:20","14:00","14:30","14:10","14:40","14:20","14:50","14:40","15:05"],[10,"14:50","15:20","15:00","15:30","15:10","15:40","15:20","15:50","15:40","16:05"],[11,"15:50","16:20","16:00","16:30","16:10","16:40","16:20","16:50","16:40","17:05"],[12,"16:50","17:20","17:00","17:30","17:10","17:40","17:20","17:50","17:40","18:05"],[13,"17:50","18:20","18:00","18:30","18:10","18:40","18:20","18:50","18:40","19:05"],[14,"18:50","19:20","19:00","19:30","19:10","19:40","19:20","19:50","19:40","20:05"],[15,"19:50","20:20","20:00","20:30","20:10","20:40","20:20","20:50","20:40","21:05"],[16,"20:50","21:20","21:00","21:30","21:10","21:40","21:20","21:50","21:40","22:05"],[17,"21:50","22:20","22:00","22:30","22:10","22:40","22:20","22:50","22:40","23:05"],[18,"22:50","23:20","23:00","23:30","23:10","23:40","23:20","23:50","23:40","0:05"],[19,"23:00","23:50","23:30","0:15","23:45","0:20","0:00","0:35","0:15","0:45"]],
    "2-1번": [[1,"6:00","6:20","6:30","6:50","7:20","7:45","8:00"],[2,"7:30","7:50","8:05","8:20","9:10","9:25","9:55"],[3,"9:20","9:40","9:55","10:10","10:35","10:50","11:20"],[4,"10:40","11:00","11:15","11:30","11:55","12:10","12:35"],[5,"12:00","12:20","12:35","12:50","13:15","13:30","13:55"],[6,"13:20","13:40","13:55","14:10","14:35","14:50","15:15"],[7,"14:40","15:00","15:15","15:30","15:55","16:10","16:35"],[8,"16:00","16:20","16:35","16:50","17:15","17:30","17:55"],[9,"17:20","17:40","17:55","18:10","18:35","18:50","19:15"],[10,"18:40","19:00","19:15","19:30","19:55","20:10","20:35"],[11,"20:00","20:20","20:35","20:50","21:15","21:30","21:55"],[12,"21:20","21:40","21:55","22:10","22:35","22:50","23:15"],[13,"22:40","23:00","23:15","23:30","23:55","0:15","0:30"]]
  },
  saturday: {
    "99번": [[1,"6:00","6:20","6:15","6:35","6:30","6:50","7:05","7:25"],[2,"6:40","7:00","6:55","7:15","7:10","7:30","7:45","8:05"],[3,"7:40","8:00","7:55","8:15","8:10","8:30","8:45","9:05"],[4,"8:40","9:00","8:55","9:15","9:10","9:30","9:45","10:05"],[5,"10:00","10:30","10:15","10:45","10:30","11:00","11:15","11:45"],[6,"11:00","11:30","11:15","11:45","11:30","12:00","12:15","12:45"],[7,"12:00","12:30","12:15","12:45","12:30","13:00","13:15","13:45"],[8,"13:00","13:30","13:15","13:45","13:30","14:00","14:15","14:45"],[9,"14:00","14:30","14:15","14:45","14:30","15:00","15:15","15:45"],[10,"15:00","15:30","15:15","15:45","15:30","16:00","16:15","16:45"],[11,"16:00","16:30","16:15","16:45","16:30","17:00","17:15","17:45"],[12,"17:00","17:30","17:15","17:45","17:30","18:00","18:15","18:45"],[13,"18:00","18:30","18:15","18:45","18:30","19:00","19:15","19:45"],[14,"19:00","19:30","19:15","19:45","19:30","20:00","20:15","20:45"],[15,"20:00","20:30","20:15","20:45","20:30","21:00","21:15","21:45"],[16,"21:00","21:30","21:15","21:45","21:30","22:00","22:15","22:45"],[17,"22:00","22:30","22:15","22:45","22:30","23:00","23:15","23:45"],[18,"23:00","23:30","23:15","23:45","23:30","23:55","23:55","0:10"],[19,"23:40","23:55","23:50","0:10","0:00","0:20","0:20","0:45"]],
    "2-1번": [[1,"6:00","6:20","6:50","7:10","7:30"],[2,"7:50","8:10","8:40","9:00","9:20"],[3,"9:40","10:00","10:30","10:50","11:10"],[4,"11:30","11:50","12:20","12:40","13:00"],[5,"13:20","13:40","14:10","14:30","14:50"],[6,"15:10","15:30","16:00","16:20","16:40"],[7,"17:00","17:20","17:50","18:10","18:30"],[8,"18:50","19:10","19:40","20:00","20:20"],[9,"20:40","21:00","21:30","21:50","22:10"],[10,"22:30","22:50","23:20","23:40","0:00"]]
  },
  holiday: {
    "99번": [[1,"6:00","6:20","6:20","6:40","7:00","7:30"],[2,"6:50","7:20","7:10","7:40","7:50","8:30"],[3,"7:50","8:20","8:10","8:40","8:50","9:30"],[4,"8:50","9:20","9:10","9:40","9:50","10:30"],[5,"9:50","10:20","10:10","10:40","10:50","11:30"],[6,"10:50","11:20","11:10","11:40","11:50","12:30"],[7,"11:50","12:20","12:10","12:40","12:50","13:30"],[8,"12:50","13:20","13:10","13:40","13:50","14:30"],[9,"13:50","14:20","14:10","14:40","14:50","15:30"],[10,"14:50","15:20","15:10","15:40","15:50","16:30"],[11,"15:50","16:20","16:10","16:40","16:50","17:30"],[12,"16:50","17:20","17:10","17:40","17:50","18:30"],[13,"17:50","18:20","18:10","18:40","18:50","19:30"],[14,"18:50","19:20","19:10","19:40","19:50","20:30"],[15,"19:50","20:20","20:10","20:40","20:50","21:30"],[16,"20:50","21:20","21:10","21:40","21:50","22:30"],[17,"21:50","22:20","22:10","22:40","22:50","23:30"],[18,"22:50","23:20","23:10","23:40","23:50","0:30"]],
    "2-1번": [[1,"6:00","6:20","6:50","7:10"],[2,"7:50","8:10","8:40","9:00"],[3,"9:40","10:00","10:30","10:50"],[4,"11:30","11:50","12:20","12:40"],[5,"13:20","13:40","14:10","14:30"],[6,"15:10","15:30","16:00","16:20"],[7,"17:00","17:20","17:50","18:10"],[8,"18:50","19:10","19:40","20:00"],[9,"20:40","21:00","21:30","21:50"],[10,"22:30","22:50","23:20","23:40"]]
  }
};

const directionOptions = {
  "99번": ["성복역", "상현역"],
  "2-1번": ["죽전역", "구성역"]
};

/* 유틸리티 함수 */
function getDayType(){ 
  const dow = new Date().getDay(); 
  return dow === 0 ? 'holiday' : (dow === 6 ? 'saturday' : 'weekday'); 
}

function getDayLabel(k){ 
  return k === 'holiday' ? '공휴일' : (k === 'saturday' ? '토요일' : '평일'); 
}

function updateDirectionOptions() {
  const route = document.getElementById('routeSelect').value;
  const dirSelect = document.getElementById('directionSelect');
  dirSelect.innerHTML = '';
  (directionOptions[route]||[]).forEach((d, i) => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d; if(i === 0) opt.selected = true;
    dirSelect.appendChild(opt);
  });
}

/* 특정 노선/방향의 다음 버스 찾기 */
function findNextBus(route, direction) {
  const now = new Date();
  const dayKey = getDayType();
  const data = (timetable[dayKey] || {})[route];
  if(!data) return null;

  const curMins = now.getHours() * 60 + now.getMinutes();
  const colsPerRow = data[0].length;
  let dirCols = [];
  
  if(route === '99번') {
    const start = (direction === '상현역') ? 1 : 2;
    for(let i=start; i<colsPerRow; i+=2) dirCols.push(i);
  } else {
    const start = (direction === '구성역') ? 1 : 2;
    for(let i=start; i<colsPerRow; i+=2) dirCols.push(i);
  }

  let allTimes = [];
  data.forEach(row => {
    dirCols.forEach(c => {
      const t = row[c];
      if(t && /^(\d{1,2}):(\d{2})$/.test(t)) {
        const [h, m] = t.split(':').map(Number);
        let mins = h * 60 + m;
        allTimes.push({ str: t, mins: mins });
      }
    });
  });
  allTimes.sort((a, b) => a.mins - b.mins);
  return allTimes.find(t => t.mins > curMins) || { str: allTimes[0].str, mins: allTimes[0].mins + 1440, isTomorrow: true };
}

/* 메인 렌더링 */
function renderAll() {
  const now = new Date();
  const dayKey = getDayType();
  const activeRoute = document.getElementById('routeSelect').value;
  const activeDir = document.getElementById('directionSelect').value;
  const isCompact = document.getElementById('compactToggle').checked;

  // 1. 현재 시간 표시
  const todayStr = now.toLocaleDateString('ko-KR', { month:'long', day:'numeric', weekday:'short' });
  const timeStr = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', hour12: false });
  document.getElementById('currentTimeDisplay').innerText = `오늘은 ${todayStr} (${getDayLabel(dayKey)}), 현재 ${timeStr}`;

  // 2. 상단 두 줄 정보 (99번 & 2-1번)
  const nextBusArea = document.getElementById('nextBusArea');
  nextBusArea.innerHTML = '';

  const routesToShow = [
    { name: '99번', class: 'route-99', dir: (activeRoute === '99번' ? activeDir : directionOptions['99번'][0]) },
    { name: '2-1번', class: 'route-21', dir: (activeRoute === '2-1번' ? activeDir : directionOptions['2-1번'][0]) }
  ];

  routesToShow.forEach(r => {
    const next = findNextBus(r.name, r.dir);
    const card = document.createElement('div');
    card.className = `bus-info-card ${r.class}`;
    
    let timeText = "운행 종료";
    let remainText = "";
    
    if(next) {
      const curMins = now.getHours() * 60 + now.getMinutes();
      const diff = next.mins - curMins;
      timeText = next.str;
      remainText = next.isTomorrow ? "(내일 첫차)" : (diff > 0 ? `${diff}분 남음` : "잠시 후");
    }

    card.innerHTML = `
      <div class="bus-name ${r.class}">${r.name} <span style="font-size:11px; color:#666; font-weight:normal;">(${r.dir} 방면)</span></div>
      <div class="bus-time-details">
        <span class="departure-time">${timeText}</span>
        <span class="remaining-min">${remainText}</span>
      </div>
    `;
    nextBusArea.appendChild(card);
  });

  // 3. 테이블 렌더링
  const container = document.getElementById('tableContainer');
  container.innerHTML = '';
  const data = (timetable[dayKey] || {})[activeRoute];
  if(!data) return;

  const colsPerRow = data[0].length;
  let dirCols = [];
  if(activeRoute === '99번') {
    const start = (activeDir === '상현역') ? 1 : 2;
    for(let i=start; i<colsPerRow; i+=2) dirCols.push(i);
  } else {
    const start = (activeDir === '구성역') ? 1 : 2;
    for(let i=start; i<colsPerRow; i+=2) dirCols.push(i);
  }

  const showCols = isCompact ? dirCols.slice(0, 3) : dirCols;

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const trH = document.createElement('tr');
  trH.appendChild(Object.assign(document.createElement('th'), { innerText: '회차' }));
  showCols.forEach((_, idx) => trH.appendChild(Object.assign(document.createElement('th'), { innerText: `${idx + 1}호차` })));
  thead.appendChild(trH);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  data.forEach(row => {
    const tr = document.createElement('tr');
    tr.appendChild(Object.assign(document.createElement('td'), { innerText: row[0], style: 'background:#f4f4f4; font-weight:bold;' }));
    showCols.forEach(c => {
      const cell = document.createElement('td');
      cell.innerText = row[c] || '';
      tr.appendChild(cell);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  container.appendChild(table);

  // 하이라이트 적용
  highlightTable(table);
}

function highlightTable(table) {
  const now = new Date();
  const cur = now.getHours() * 60 + now.getMinutes();
  const rows = table.querySelectorAll('tbody tr');
  const pts = [];

  rows.forEach((tr, rIdx) => {
    const tds = tr.querySelectorAll('td');
    tds.forEach((td, cIdx) => {
      if(cIdx === 0) return;
      const m = td.innerText.match(/^(\d{1,2}):(\d{2})$/);
      if(m) {
        pts.push({ td, mins: parseInt(m[1]) * 60 + parseInt(m[2]) });
      }
    });
  });

  if(pts.length === 0) return;
  pts.sort((a, b) => a.mins - b.mins);

  let prev = null, next = null;
  for(const p of pts) {
    if(p.mins <= cur) prev = p;
    if(p.mins > cur) { next = p; break; }
  }
  if(prev) prev.td.classList.add('cell-prev');
  if(next) next.td.classList.add('cell-next');
}

/* 초기화 및 이벤트 리스너 */
updateDirectionOptions();
renderAll();

document.getElementById('routeSelect').addEventListener('change', () => { updateDirectionOptions(); renderAll(); });
document.getElementById('directionSelect').addEventListener('change', renderAll);
document.getElementById('compactToggle').addEventListener('change', renderAll);
setInterval(renderAll, 30000); // 30초마다 자동 갱신
</script>
</body>
</html>
