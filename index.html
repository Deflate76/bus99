<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>버스 출발 시간표</title>
  <meta name="description" content="99번, 801번, 2-1번 버스 출발 시간표를 모바일 홈 화면에 설치해 빠르게 확인하세요." />
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="버스출발" />
  
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body { font-family: Arial, Helvetica, "Noto Sans KR", system-ui; background:#f5f5f5; margin:0; color: #333; }

    .selectors { display:flex; flex-wrap:wrap; gap:12px; padding:12px 16px; background:#333; color:#fff; align-items:center; }
    .selectors label { flex:1 1 45%; min-width:0; font-size: 14px; }
    select { padding:8px; border-radius: 4px; width: 100%; margin-top: 4px; border:none; font-size: 15px; }

    .info { padding:16px; background:#fff; border-bottom: 2px solid #ddd; }
    .current-time { font-size: 13px; color: #666; margin-bottom: 10px; }
    .next-bus-area { display: flex; flex-direction: column; gap: 8px; }
    
    .bus-info-card { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-radius: 8px; background: #f9f9f9; border-left: 5px solid #ccc; }
    .bus-info-card.route-99 { border-left-color: #d32f2f; }
    .bus-info-card.route-801 { border-left-color: #388e3c; }
    .bus-info-card.route-21 { border-left-color: #1976d2; }
    
    .bus-name { font-weight: bold; font-size: 16px; }
    .bus-name.route-99 { color: #d32f2f; }
    .bus-name.route-801 { color: #388e3c; }
    .bus-name.route-21 { color: #1976d2; }
    
    .bus-time-details { text-align: right; }
    .departure-time { font-size: 16px; font-weight: bold; color: #222; }
    .remaining-min { font-size: 13px; color: #ff5722; font-weight: bold; margin-left: 5px; }

    .table-container { padding:8px; overflow-x:auto; background: #fff; width: 100%; }
    table { width:100%; border-collapse:collapse; table-layout: auto; }
    th, td { border:1px solid #ccc; padding:8px 1px; text-align:center; font-size: 13px; white-space: nowrap; }
    th { background:#eee; font-weight: bold; }
    
    .cell-prev { background:#c8e6c9 !important; }
    .cell-next { background:#fff59d !important; font-weight: bold; border: 2px solid #fbc02d !important; }

    @media (max-width: 480px) {
      th, td { font-size: 11.5px; padding: 7px 0px; }
      .bus-name { font-size: 14px; }
      .departure-time { font-size: 14px; }
    }
  </style>

  <script src="data_99_801.js"></script>
  <script src="data_2_1.js"></script>
</head>
<body>

  <div class="selectors">
    <label>노선 선택:
      <select id="routeSelect">
        <option value="99번">99번</option>
        <option value="801번">801번</option>
        <option value="2-1번" selected>2-1번</option>
      </select>
    </label>
    <label>출발 방향:
      <select id="directionSelect"></select>
    </label>
  </div>

  <div class="info" id="infoBox">
    <div class="current-time" id="currentTimeDisplay">데이터를 변환 중입니다...</div>
    <div class="next-bus-area" id="nextBusArea"></div>
  </div>

  <div class="table-container" id="tableContainer"></div>

<script>
let timetable = { weekday: {}, saturday: {}, holiday: {} };

const directionOptions = {
  "99번": ["상현역", "성복역"],
  "801번": ["상현역", "성복역"],
  "2-1번": ["구성역", "죽전역"]
};

// 올려주신 Flat Object 데이터를 표(2차원 배열) 형식으로 변환하는 핵심 로직
function parseFlatData(flatArray) {
  const dayMap = { "평일": "weekday", "토요일": "saturday", "공휴일": "holiday" };
  
  // 홀수 열(1)은 구성/상현, 짝수 열(2)은 죽전/성복
  const dirOffsetMap = {
    "구성": 0, "구성역": 0, "상현": 0, "상현역": 0,
    "죽전": 1, "죽전역": 1, "성복": 1, "성복역": 1
  };

  flatArray.forEach(item => {
    const dayKey = dayMap[item.DayKind];
    if (!dayKey) return;
    
    let routeName = item.버스;
    if (!routeName.endsWith("번")) routeName += "번"; // "2-1" -> "2-1번"

    const startNode = item.StartFrom;
    const round = parseInt(item.회차);
    const carNum = parseInt(item.호수);
    const time = item.시간;

    if (!timetable[dayKey][routeName]) timetable[dayKey][routeName] = [];

    // 해당 회차(Row) 찾기 또는 생성
    let row = timetable[dayKey][routeName].find(r => r[0] === round);
    if (!row) {
      row = [round];
      timetable[dayKey][routeName].push(row);
    }

    const dirOffset = dirOffsetMap[startNode];
    if (dirOffset !== undefined) {
      // 호수(carNum)에 따라 넣을 위치(컬럼 인덱스) 계산
      const colIdx = (carNum - 1) * 2 + 1 + dirOffset;
      row[colIdx] = time;
    }
  });

  // 배열 정렬 및 빈칸 채우기 처리
  ['weekday', 'saturday', 'holiday'].forEach(dayKey => {
    Object.keys(timetable[dayKey]).forEach(route => {
      let data = timetable[dayKey][route];
      data.sort((a, b) => a[0] - b[0]); // 회차 오름차순 정렬
      
      let maxCols = 0;
      data.forEach(r => { if(r.length > maxCols) maxCols = r.length; });
      data.forEach(r => {
        for(let i=1; i<maxCols; i++) {
          if(r[i] === undefined) r[i] = "";
        }
      });
    });
  });
}

function loadTimetableData() {
  try {
    // 1. data_2_1.js 에서 불러온 변수 파싱
    if (typeof rawData2_1 !== 'undefined') {
      parseFlatData(rawData2_1);
    }
    // 2. data_99_801.js 에서 불러온 변수 파싱 (파일이 있다면)
    if (typeof rawData99_801 !== 'undefined') {
      parseFlatData(rawData99_801);
    }

    updateDirectionOptions();
    renderAll();

    document.getElementById('routeSelect').addEventListener('change', () => { 
      updateDirectionOptions(); 
      renderAll(); 
    });
    document.getElementById('directionSelect').addEventListener('change', renderAll);
    setInterval(renderAll, 30000);

  } catch (error) {
    console.error("데이터 초기화 오류", error);
    document.getElementById('currentTimeDisplay').innerText = "데이터 오류 발생";
  }
}

function getDayType(){ 
  const dow = new Date().getDay(); 
  return dow === 0 ? 'holiday' : (dow === 6 ? 'saturday' : 'weekday'); 
}

function updateDirectionOptions() {
  const route = document.getElementById('routeSelect').value;
  const dirSelect = document.getElementById('directionSelect');
  dirSelect.innerHTML = '';
  (directionOptions[route]||[]).forEach((d, i) => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d; if(i === 0) opt.selected = true;
    dirSelect.appendChild(opt);
  });
}

function timeToMins(timeStr) {
  if (!timeStr || timeStr === "충전" || timeStr === "") return -1;
  const parts = timeStr.split(':');
  if(parts.length !== 2) return -1;
  const h = Number(parts[0]), m = Number(parts[1]);
  if(isNaN(h) || isNaN(m)) return -1;
  let total = h * 60 + m;
  if (h < 4) total += 1440; // 새벽 시간 보정
  return total;
}

function getDirectionStartColumn(direction) {
  // 상현역, 구성역은 홀수 인덱스(1, 3, 5...)
  if (direction.includes('상현') || direction.includes('구성')) return 1;
  return 2;
}

function findNextBus(route, direction) {
  const now = new Date();
  const dayKey = getDayType();
  const data = timetable[dayKey][route];
  if(!data || data.length === 0) return null;

  let curMins = now.getHours() * 60 + now.getMinutes();
  if (now.getHours() < 4) curMins += 1440;

  const colsPerRow = data[0].length;
  let dirCols = [];
  const start = getDirectionStartColumn(direction);
  for(let i=start; i<colsPerRow; i+=2) dirCols.push(i);

  let allTimes = [];
  data.forEach(row => {
    dirCols.forEach(c => {
      const t = row[c];
      const mins = timeToMins(t);
      if(mins !== -1) allTimes.push({ str: t, mins: mins });
    });
  });
  
  if (allTimes.length === 0) return null;
  allTimes.sort((a, b) => a.mins - b.mins);
  
  const next = allTimes.find(t => t.mins > curMins);
  return next || { str: allTimes[0].str, mins: allTimes[0].mins + 1440, isTomorrow: true };
}

function renderAll() {
  const now = new Date();
  const dayKey = getDayType();
  const activeRoute = document.getElementById('routeSelect').value;
  const activeDir = document.getElementById('directionSelect').value;

  const todayStr = now.toLocaleDateString('ko-KR', { month:'long', day:'numeric', weekday:'short' });
  const timeStr = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', hour12: false });
  document.getElementById('currentTimeDisplay').innerText = `오늘은 ${todayStr} (${dayKey==='holiday'?'공휴일':dayKey==='saturday'?'토요일':'평일'}), 현재 ${timeStr}`;

  const nextBusArea = document.getElementById('nextBusArea');
  nextBusArea.innerHTML = '';

  const routesToShow = [
    { name: '99번', class: 'route-99', dir: (activeRoute === '99번' ? activeDir : directionOptions['99번'][0]) },
    { name: '801번', class: 'route-801', dir: (activeRoute === '801번' ? activeDir : directionOptions['801번'][0]) },
    { name: '2-1번', class: 'route-21', dir: (activeRoute === '2-1번' ? activeDir : directionOptions['2-1번'][0]) }
  ];

  routesToShow.forEach(r => {
    const next = findNextBus(r.name, r.dir);
    if (!next) return; // 데이터가 없는 노선은 카드 생략
    const card = document.createElement('div');
    card.className = `bus-info-card ${r.class}`;
    
    let curMins = now.getHours() * 60 + now.getMinutes();
    if (now.getHours() < 4) curMins += 1440;
    const diff = next.mins - curMins;
    const remainText = next.isTomorrow ? "(내일 첫차)" : (diff > 0 ? `${diff}분 남음` : "잠시 후");
    
    card.innerHTML = `
      <div class="bus-name ${r.class}">${r.name} <span style="font-size:11px; color:#666; font-weight:normal;">(${r.dir} 방면)</span></div>
      <div class="bus-time-details">
        <span class="departure-time">${next.str}</span>
        <span class="remaining-min">${remainText}</span>
      </div>
    `;
    nextBusArea.appendChild(card);
  });

  const container = document.getElementById('tableContainer');
  container.innerHTML = '';
  const data = timetable[dayKey][activeRoute];
  if(!data || data.length === 0) {
    container.innerHTML = `<div style="padding: 20px; text-align: center; color: #888;">해당 요일의 ${activeRoute} 시간표 데이터가 없습니다.</div>`;
    return;
  }

  const colsPerRow = data[0].length;
  let dirCols = [];
  const start = getDirectionStartColumn(activeDir);
  for(let i=start; i<colsPerRow; i+=2) dirCols.push(i);

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const trH = document.createElement('tr');
  trH.appendChild(Object.assign(document.createElement('th'), { innerText: '회차' }));
  dirCols.forEach((_, idx) => trH.appendChild(Object.assign(document.createElement('th'), { innerText: `${idx + 1}호차` })));
  thead.appendChild(trH);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  data.forEach(row => {
    const tr = document.createElement('tr');
    tr.appendChild(Object.assign(document.createElement('td'), { innerText: row[0], style: 'background:#f4f4f4; font-weight:bold;' }));
    dirCols.forEach(c => {
      const cell = document.createElement('td');
      cell.innerText = row[c] || '';
      tr.appendChild(cell);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  container.appendChild(table);

  highlightTable(table);
}

function highlightTable(table) {
  const now = new Date();
  let curMins = now.getHours() * 60 + now.getMinutes();
  if (now.getHours() < 4) curMins += 1440;

  const rows = table.querySelectorAll('tbody tr');
  let allPoints = [];
  rows.forEach((tr) => {
    const tds = tr.querySelectorAll('td');
    tds.forEach((td, cIdx) => {
      if(cIdx === 0) return;
      const mins = timeToMins(td.innerText);
      if(mins !== -1) allPoints.push({ td, mins });
    });
  });

  if(allPoints.length === 0) return;
  allPoints.sort((a, b) => a.mins - b.mins);

  let prevPoint = null, nextPoint = null;
  for (let i = 0; i < allPoints.length; i++) {
    if (allPoints[i].mins > curMins) {
      nextPoint = allPoints[i];
      prevPoint = allPoints[i-1] || null;
      break;
    }
  }
  if (!nextPoint) { nextPoint = allPoints[0]; prevPoint = allPoints[allPoints.length - 1]; }

  allPoints.forEach(p => p.td.classList.remove('cell-prev', 'cell-next'));
  if (prevPoint) prevPoint.td.classList.add('cell-prev');
  if (nextPoint) nextPoint.td.classList.add('cell-next');
}

// 스크립트 실행
window.onload = loadTimetableData;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(console.error);
  });
}
</script>
</body>
</html>
