<html lang="ko">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="HandheldFriendly" content="true" />
  <title>버스 시간표 (99번 / 2-1번)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: Arial, Helvetica, "Noto Sans KR", system-ui;
      background:#f5f5f5;
      margin:0;
    }

    .selectors {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      padding:12px 16px;
      background:#333;
      color:#fff;
      align-items:center;
    }
    .selectors label {
      flex:1 1 45%;
      min-width:0; 
    }
    .toggles {
      display:flex;
      align-items:center;
      gap:8px;
      margin-left:auto;
      flex:0 0 auto;
    }
    .toggles label { font-size:13px; }
    select { padding:6px 8px; border-radius: 4px; }
    .info { padding:12px 16px; background:#eee; color:#222; border-bottom: 1px solid #ccc; }

    .table-container {
      padding:8px; /* 패딩 축소 */
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      width:100%;
    }

    table {
      width:100%;
      border-collapse:collapse;
      /* table-layout: fixed 삭제 - 내용물에 맞게 자동 조절 */
    }
    th, td {
      border:1px solid #999;
      padding:6px 2px; /* 좌우 패딩 최소화 */
      text-align:center;
      white-space:nowrap; /* 시간 안잘리게 */
      font-size: 13px;
    }
    th { background:#eee; font-weight: bold; }

    /* 데스크톱 sticky */
    @media (min-width: 769px) {
      table thead th { position: sticky; top: 0; z-index: 2; }
      table th:first-child, table td:first-child {
        position: sticky;
        left: 0;
        background:#fafafa;
        z-index: 3;
      }
    }

    /* 모바일 최적화 - 5개 열을 다 보여주기 위한 설정 */
    @media (max-width: 768px) {
      body { font-size: 14px; }
      .selectors label { width: calc(50% - 8px); }
      .selectors select { width: 100%; padding:8px; font-size:15px; }
      .info { font-size: 13px; line-height: 1.4; }
      
      /* 5호차까지 다 보이도록 글자 크기 및 여백 조정 */
      th, td { 
        font-size: 12px; 
        padding: 8px 1px; 
      }
    }

    @media (max-width: 380px) {
      th, td { font-size: 11px; } /* 아주 좁은 화면 대응 */
    }

    .cell-prev { background:#c8e6c9 !important } /* 이전 버스 (초록색) */
    .cell-next { background:#fff59d !important } /* 다음 버스 (노란색) */
    
    .next-bus-highlight {
      display: block;
      margin-top: 6px;
      font-size: 1.1em;
      color: #d32f2f;
    }
    .time-left {
      color: #007bff;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <div class="selectors">
    <label>노선:
      <select id="routeSelect">
        <option value="99번" selected>99번</option>
        <option value="2-1번">2-1번</option>
      </select>
    </label>
    <label>출발 방향:
      <select id="directionSelect"></select>
    </label>

    <div class="toggles">
      <input type="checkbox" id="compactToggle" />
      <label for="compactToggle">열 축소</label>
    </div>
  </div>

  <div class="info" id="infoBox">로딩 중…</div>
  <div class="table-container" id="tableContainer"></div>

      [4,"11:30","11:50","12:20","12:40"],

const directionOptions = {
  "99번": ["성복역", "상현역"],
  "2-1번": ["죽전역", "구성역"]
};

function getDayType(){ const dow=new Date().getDay(); return dow===0?'holiday':(dow===6?'saturday':'weekday'); }
function getDayLabel(k){ return k==='holiday'?'공휴일':(k==='saturday'?'토요일':'평일'); }

function updateDirectionOptions() {
  const route = document.getElementById('routeSelect').value;
  const dirSelect = document.getElementById('directionSelect');
  dirSelect.innerHTML = '';
  (directionOptions[route]||[]).forEach((d,i)=>{
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d; if(i===0) opt.selected=true;
    dirSelect.appendChild(opt);
  });
}

function renderTable(){
  const now = new Date();
  const dayKey = getDayType();
  const route = document.getElementById('routeSelect').value;
  const direction = document.getElementById('directionSelect').value;
  const container = document.getElementById('tableContainer');
  const infoBox = document.getElementById('infoBox');
  const manualCompact = document.getElementById('compactToggle').checked;
  container.innerHTML = '';

  const todayStr = now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  let infoHtml = `<div>오늘은 ${todayStr} (${getDayLabel(dayKey)}), 현재 시각: ${timeStr}</div>`;

  const data = (timetable[dayKey]||{})[route];
  if(!data || !data.length){ 
    infoBox.innerHTML = infoHtml;
    container.textContent='해당 데이터가 없습니다'; 
    return; 
  }

  const colsPerRow = data[0].length;
  let dirCols=[];
  if(route==='99번'){
    const start = (direction==='상현역')?1:2;
    for(let i=start;i<colsPerRow;i+=2) dirCols.push(i);
  } else if(route==='2-1번'){
    const start = (direction==='구성역')?1:2;
    for(let i=start;i<colsPerRow;i+=2) dirCols.push(i);
  }

  const curMins = now.getHours() * 60 + now.getMinutes();
  let nextBusTime = "";
  let allTimes = [];

  for(const row of data) {
    dirCols.forEach(c => {
      const t = row[c];
      if (t && /^(\d{1,2}):(\d{2})$/.test(t)) {
        const [h, m] = t.split(':').map(Number);
        allTimes.push({ str: t, mins: h * 60 + m });
      }
    });
  }
  allTimes.sort((a, b) => a.mins - b.mins);
  const nextFound = allTimes.find(t => t.mins > curMins);
  
  let remainingText = "";
  if (nextFound) {
    nextBusTime = nextFound.str;
    const diff = nextFound.mins - curMins;
    remainingText = diff > 0 ? `(${diff}분 남음)` : "(잠시 후 도착)";
  } else if (allTimes.length > 0) {
    nextBusTime = allTimes[0].str + " (내일 첫차)";
  }

  if(nextBusTime) {
    infoHtml += `<b class="next-bus-highlight">다음 버스 출발시간 : ${nextBusTime} <span class="time-left">${remainingText}</span></b>`;
  }
  infoBox.innerHTML = infoHtml;

  const showCols = manualCompact ? dirCols.slice(0, 3) : dirCols;

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const trH = document.createElement('tr');
  trH.appendChild(Object.assign(document.createElement('th'),{innerText:'회차'}));
  
  // 헤더 텍스트 수정: 'n호차 역이름' -> 'n호차'
  showCols.forEach((_,idx)=> trH.appendChild(Object.assign(document.createElement('th'),{innerText:`${idx+1}호차`})) );
  
  thead.appendChild(trH);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  for(const row of data){
    const tr = document.createElement('tr');
    tr.appendChild(Object.assign(document.createElement('td'),{innerText:row[0]}));
    showCols.forEach(c=> tr.appendChild(Object.assign(document.createElement('td'),{innerText:row[c]||''})) );
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  container.appendChild(table);

  highlight(table);
}

function highlight(table){
  const now=new Date(); const cur=now.getHours()*60+now.getMinutes();
  const rows=table.querySelectorAll('tr'); if(!rows.length) return;
  table.querySelectorAll('td').forEach(el=>el.classList.remove('cell-prev','cell-next'));
  
  const pts=[];
  for(let r=1;r<rows.length;r++){
    const tds=rows[r].querySelectorAll('td');
    for(let c=1;c<tds.length;c++){
      const m=tds[c].innerText.match(/^(\d{1,2}):(\d{2})$/);
      if(!m) continue;
      const mins=parseInt(m[1])*60+parseInt(m[2]);
      pts.push({r,c,mins});
    }
  }
  if(!pts.length) return;
  pts.sort((a,b)=>a.mins-b.mins);
  
  let prev=null, next=null;
  for(const p of pts){ if(p.mins<=cur) prev=p; if(p.mins>cur){ next=p; break; } }
  if(!next) next=pts[0]; 
  if(!prev) prev=pts[pts.length-1];

  const pc = rows[prev.r].querySelectorAll('td')[prev.c];
  const nc = rows[next.r].querySelectorAll('td')[next.c];
  if(pc) pc.classList.add('cell-prev');
  if(nc) nc.classList.add('cell-next');
}

updateDirectionOptions();
renderTable();

document.getElementById('routeSelect').addEventListener('change', ()=>{ updateDirectionOptions(); renderTable(); });
document.getElementById('directionSelect').addEventListener('change', renderTable);
document.getElementById('compactToggle').addEventListener('change', renderTable);
window.addEventListener('resize', renderTable);
setInterval(renderTable, 30000); 
</script>
